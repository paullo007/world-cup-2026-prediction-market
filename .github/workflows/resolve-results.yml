name: Resolve match results

# Backstop scheduler for settling finished World Cup matches. Vercel's own cron
# is plan-limited and was never firing for this project, so we drive the
# throttled, public self-heal endpoint from GitHub Actions instead. The endpoint
# is idempotent + cooldown-throttled, so frequent hits are harmless. The in-app
# self-heal (<AutoResolve> on page load) covers the case where someone is viewing
# the site; this covers the case where nobody is.
on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes (GitHub's minimum granularity is ~5m)
  workflow_dispatch: {}      # allow manual runs from the Actions tab

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-resolve
        run: |
          curl -fsS -X POST \
            "https://world-cup-2026-prediction-market.vercel.app/api/auto-resolve" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n"
